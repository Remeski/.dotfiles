source = ~/.config/hypr/monitors.conf

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin

# $menu = rofi -show drun
# $menu2 = rofi -show run
# $windows = rofi -show window
# $menu = walker
$menu = fuzzel

# $browserRun = gtk-launch brave-browser
# $browser = zen-browser


#################
### AUTOSTART ###
#################

exec-once = hypridle 

# notifications
exec-once = dunst


# for walker 
# exec-once = elephant
# exec-once = walker --gapplication-service

# wallpaper
exec-once = awww-daemon
exec = killall waybar; waybar

# default apps
exec-once = [workspace 1] exec $terminal tmux

# old
# exec-once = [workspace 2] exec $browserRun
# exec-once = wl-paste --watch cliphist store
# exec = killall hyprpaper; hyprpaper

#############################
### ENVIRONMENT VARIABLES ###
#############################
# https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#############
### LOOKS ###
#############
source = ~/.config/hypr/theme.conf

#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input

input {
		kb_layout = us,fi
    kb_variant =
    kb_model =

		kb_options=grp:win_space_toggle	
		# kr_options = caps:escape
    kb_rules =

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
    }
}

# https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs

device {
    name = logitech-g703-ls-1
    sensitivity = -0.4
}

cursor {
    no_warps = true
}


###################
### KEYBINDINGS ###
###################
# https://wiki.hyprland.org/Configuring/Keywords/
# https://wiki.hyprland.org/Configuring/Binds/

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, E, exit,
#bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, T, togglegroup
bind = $mainMod, L, changegroupactive
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod SHIFT, V, exec, rofi -modi clipboard:~/.local/scripts/cliphist-rofi-img -show clipboard -show-icons
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard only
bind = $mainMod, M, exec, kill -9 $(pgrep pulsemixer) || $terminal pulsemixer
bind = $mainMod, B, exec, kill -9 $(pgrep bluetui) || $terminal bluetui
bind = $mainMod SHIFT, T, exec, pkill waybar || waybar
bind = $mainMod SHIFT, R, exec, ~/.local/scripts/screen-record.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod SHIFT CTRL, L, resizeactive, 90 0
bind = $mainMod SHIFT CTRL, H, resizeactive, -90 0
bind = $mainMod SHIFT CTRL, K, resizeactive, 0 -90
bind = $mainMod SHIFT CTRL, J, resizeactive, 0 90

bind = $mainMod SHIFT, H, movewindoworgroup, l
bind = $mainMod SHIFT, L, movewindoworgroup, r
bind = $mainMod SHIFT, K, movewindoworgroup, u
bind = $mainMod SHIFT, J, movewindoworgroup, d

bind = $mainMod ALT, l, movecurrentworkspacetomonitor, $externalMonitor
bind = $mainMod ALT, h, movecurrentworkspacetomonitor, $laptopMonitor

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Open default apps
# bind = $mainMod SHIFT, d, exec, hyprctl dispatch exec [workspace 3] $browser && hyprctl dispatch exec [workspace 2] obsidian
bind = $mainMod SHIFT, d, exec, ~/.config/hypr/default_apps.sh 

# Gaming mode
bind = $mainMod SHIFT CTRL, g, exec, ~/.config/hypr/gamemode.sh

# Laptop multimedia keys for volume and LCD brightness
$notifyBrightness = notify-send -r 9991 -i video-display-brightness-symbolic -h INT:value:$(brightnessctl i -m | cut -d',' -f4 | tr -d "%") Brightness $(brightnessctl i -m | cut -d',' -f4)

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s +5% -n 5% -e 10 && $notifyBrightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%- -n 5% -e 10 && $notifyBrightness

# Requires playerctl
# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# https://wiki.hyprland.org/Configuring/Window-Rules/
# https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
#
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$
windowrule = idle_inhibit fullscreen, match:class ^(brave-browser)$
windowrule = idle_inhibit fullscreen, match:class ^(zen)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule { 
	name = fix xwayland
	match:class = ^$,title:^$ 
	match:xwayland = 1
	match:fullscreen = 0
	no_focus = on
	no_blur = on
}

windowrule = workspace 10, match:class Spotify
windowrule = workspace 3, match:class zen
windowrule = workspace 3, match:class firefox
windowrule = workspace 3, match:class helium
windowrule = workspace 2, match:class obsidian
windowrule = workspace 7, match:class discord
windowrule = workspace 7, match:title ^(.*Discord.*)$
windowrule = float on, match:title ^.*(NordPass)$
# windowrulev2 = float, class:^.*(ModernGL)$
windowrule = size 800 500, match:title Virtual Machine Manager
windowrule = float on, match:class virt-manager
windowrule = workspace 6, match:class virt-manager


# Devving
windowrule = workspace 2, match:class nannou
windowrule = float on, match:title OPENGLDEV

workspace = 1, monitor:$externalMonitor
workspace = 2, monitor:$externalMonitor
workspace = 3, monitor:$externalMonitor
workspace = 4, monitor:$externalMonitor
workspace = 5, monitor:$externalMonitor

workspace = 6, monitor:$laptopMonitor
workspace = 7, monitor:$laptopMonitor
workspace = 8, monitor:$laptopMonitor
workspace = 9, monitor:$laptopMonitor
workspace = 10, monitor:$laptopMonitor

workspace = 1, layout:master

general {
	layout = dwindle
}

dwindle {
    preserve_split = true # You probably want this
}

master {
	new_status = slave
	allow_small_split = true
}

xwayland {
    enabled = true
    use_nearest_neighbor = true
    force_zero_scaling = true
    create_abstract_socket = false
}

debug {
	disable_logs = false
}
